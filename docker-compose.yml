# KinTunnel Docker Compose MVP.
#
# KinTunnel uses KINTUNNEL_* environment variables and lowercase kintunnel
# image, path, volume, and container names:
#   ghcr.io/OWNER/kintunnel-engine:v0.1.0
#   ghcr.io/OWNER/kintunnel-admin:v0.1.0
#
# Minimal VPS:
#   cp .env.example .env
#   mkdir -p config/secrets
#   openssl rand -base64 32 > config/secrets/admin-token.txt
#   openssl rand -base64 32 > config/secrets/engine-api-token.txt
#   docker compose --profile admin up -d
#
# Compose builds local images by default. Set KINTUNNEL_ENGINE_IMAGE and
# KINTUNNEL_ADMIN_IMAGE to retag or pull published images when you deliberately
# skip local builds. Docker Compose cannot make build: conditional; charming.
#
# Dokploy / Swarm:
#   Prefer compose/dokploy-swarm.yml as a starting point.
#   Keep the VPN engine at one replica. WireGuard state, UDP ownership, and NAT
#   are not a scale-out web workload, tempting though that illusion may be.

name: ${COMPOSE_PROJECT_NAME:-kintunnel}

services:
  engine:
    image: ${KINTUNNEL_ENGINE_IMAGE:-kintunnel-engine:local}
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: ${KINTUNNEL_ENGINE_CONTAINER:-kintunnel-engine}
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    environment:
      KINTUNNEL_ENV: ${KINTUNNEL_ENV:-production}
      KINTUNNEL_DRY_RUN: ${KINTUNNEL_DRY_RUN:-true}
      KINTUNNEL_ENGINE_API_TOKEN_FILE: /run/secrets/kintunnel_engine_api_token
      KINTUNNEL_PUBLIC_ENDPOINT: ${KINTUNNEL_PUBLIC_ENDPOINT:?set KINTUNNEL_PUBLIC_ENDPOINT in .env}
      KINTUNNEL_ENDPOINT_HOST: ${KINTUNNEL_PUBLIC_ENDPOINT:?set KINTUNNEL_PUBLIC_ENDPOINT in .env}
      KINTUNNEL_ENDPOINT_PORT: ${KINTUNNEL_WG_PORT:-51820}
      KINTUNNEL_WG_INTERFACE: ${KINTUNNEL_WG_INTERFACE:-wg0}
      KINTUNNEL_WG_LISTEN_PORT: ${KINTUNNEL_WG_PORT:-51820}
      KINTUNNEL_WG_PORT: ${KINTUNNEL_WG_PORT:-51820}
      KINTUNNEL_WG_ADDRESS: ${KINTUNNEL_WG_ADDRESS:-10.44.0.1/24}
      KINTUNNEL_DNS_SERVERS: ${KINTUNNEL_WG_DNS:-1.1.1.1}
      KINTUNNEL_WG_DNS: ${KINTUNNEL_WG_DNS:-1.1.1.1}
      KINTUNNEL_ALLOWED_IPS: ${KINTUNNEL_ALLOWED_IPS:-0.0.0.0/0}
      KINTUNNEL_DATA_DIR: /var/lib/kintunnel
      KINTUNNEL_CONFIG_FILE: /etc/kintunnel/kintunnel.yml
      TZ: ${TZ:-UTC}
    volumes:
      - ./config:/etc/kintunnel:ro
      - kintunnel-data:/var/lib/kintunnel
      - kintunnel-backups:/backups
    ports:
      - target: ${KINTUNNEL_WG_PORT:-51820}
        published: ${KINTUNNEL_WG_PORT:-51820}
        protocol: udp
        mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9090/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - control
    secrets:
      - kintunnel_engine_api_token

  admin:
    image: ${KINTUNNEL_ADMIN_IMAGE:-kintunnel-admin:local}
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: ${KINTUNNEL_ADMIN_CONTAINER:-kintunnel-admin}
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    profiles:
      - admin
    environment:
      KINTUNNEL_ENV: ${KINTUNNEL_ENV:-production}
      KINTUNNEL_ADMIN_BIND: 0.0.0.0
      KINTUNNEL_ADMIN_PORT: 8080
      KINTUNNEL_ENGINE_URL: http://engine:9090
      KINTUNNEL_ENGINE_API_TOKEN_FILE: /run/secrets/kintunnel_engine_api_token
      KINTUNNEL_ADMIN_TOKEN_FILE: /run/secrets/kintunnel_admin_token
      TZ: ${TZ:-UTC}
    volumes:
      - ./config:/etc/kintunnel:ro
    ports:
      # Localhost by default. Put Caddy, Traefik, Dokploy, or an SSH tunnel in
      # front of this before exposing it. The internet contains opinions.
      - "${KINTUNNEL_ADMIN_BIND_HOST:-127.0.0.1}:${KINTUNNEL_ADMIN_PORT:-8080}:8080/tcp"
    secrets:
      - kintunnel_admin_token
      - kintunnel_engine_api_token
    depends_on:
      engine:
        condition: service_healthy
    networks:
      - control

networks:
  control:
    driver: bridge
    internal: false

volumes:
  kintunnel-data:
  kintunnel-backups:

secrets:
  kintunnel_admin_token:
    file: ${KINTUNNEL_ADMIN_TOKEN_FILE:-./config/secrets/admin-token.txt}
  kintunnel_engine_api_token:
    file: ${KINTUNNEL_ENGINE_API_TOKEN_FILE:-./config/secrets/engine-api-token.txt}
