# Dokploy / Docker Swarm reference stack.
#
# This is a starting point, not magic. Deploy one engine replica pinned to the
# node that owns the WireGuard state:
#
#   docker node update --label-add kintunnel.vpn=true <node>
#   docker stack deploy -c compose/dokploy-swarm.yml KINTUNNEL
#
# Dokploy should handle HTTPS routing for the admin service. Keep the WireGuard
# UDP port published directly in host mode. Do not scale the engine unless you
# have deliberately designed state replication, which this MVP has not.
# Keep KINTUNNEL_DRY_RUN=true unless your platform can provide /dev/net/tun and
# you are deliberately testing host networking behavior.

services:
  engine:
    image: ${KINTUNNEL_ENGINE_IMAGE:?set KINTUNNEL_ENGINE_IMAGE to a published engine image}
    environment:
      KINTUNNEL_ENV: ${KINTUNNEL_ENV:-production}
      KINTUNNEL_DRY_RUN: ${KINTUNNEL_DRY_RUN:-true}
      KINTUNNEL_ENGINE_API_TOKEN_FILE: /run/secrets/kintunnel_engine_api_token
      KINTUNNEL_PUBLIC_ENDPOINT: ${KINTUNNEL_PUBLIC_ENDPOINT:?set KINTUNNEL_PUBLIC_ENDPOINT}
      KINTUNNEL_ENDPOINT_HOST: ${KINTUNNEL_PUBLIC_ENDPOINT:?set KINTUNNEL_PUBLIC_ENDPOINT}
      KINTUNNEL_ENDPOINT_PORT: ${KINTUNNEL_WG_PORT:-51820}
      KINTUNNEL_WG_INTERFACE: ${KINTUNNEL_WG_INTERFACE:-wg0}
      KINTUNNEL_WG_LISTEN_PORT: ${KINTUNNEL_WG_PORT:-51820}
      KINTUNNEL_WG_PORT: ${KINTUNNEL_WG_PORT:-51820}
      KINTUNNEL_WG_ADDRESS: ${KINTUNNEL_WG_ADDRESS:-10.44.0.1/24}
      KINTUNNEL_DNS_SERVERS: ${KINTUNNEL_WG_DNS:-1.1.1.1}
      KINTUNNEL_WG_DNS: ${KINTUNNEL_WG_DNS:-1.1.1.1}
      KINTUNNEL_ALLOWED_IPS: ${KINTUNNEL_ALLOWED_IPS:-0.0.0.0/0}
      KINTUNNEL_DATA_DIR: /var/lib/kintunnel
      KINTUNNEL_CONFIG_FILE: /etc/kintunnel/kintunnel.yml
      TZ: ${TZ:-UTC}
    volumes:
      - kintunnel_config:/etc/kintunnel:ro
      - kintunnel_data:/var/lib/kintunnel
      - kintunnel_backups:/backups
    ports:
      - target: ${KINTUNNEL_WG_PORT:-51820}
        published: ${KINTUNNEL_WG_PORT:-51820}
        protocol: udp
        mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    secrets:
      - kintunnel_engine_api_token
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    networks:
      - control
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.kintunnel.vpn == true
      restart_policy:
        condition: any

  admin:
    image: ${KINTUNNEL_ADMIN_IMAGE:?set KINTUNNEL_ADMIN_IMAGE to a published admin image}
    environment:
      KINTUNNEL_ENV: ${KINTUNNEL_ENV:-production}
      KINTUNNEL_ADMIN_BIND: 0.0.0.0
      KINTUNNEL_ADMIN_PORT: 8080
      KINTUNNEL_ENGINE_URL: http://engine:9090
      KINTUNNEL_ENGINE_API_TOKEN_FILE: /run/secrets/kintunnel_engine_api_token
      KINTUNNEL_ADMIN_TOKEN_FILE: /run/secrets/kintunnel_admin_token
      TZ: ${TZ:-UTC}
    secrets:
      - kintunnel_admin_token
      - kintunnel_engine_api_token
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - control
      - edge
    deploy:
      replicas: 1
      labels:
        # Replace with Dokploy/Traefik labels used by your installation.
        # Keep access control on this route. Bravery is not authentication.
        kintunnel.route.example: "https://vpn-admin.example.com"
      restart_policy:
        condition: any

networks:
  control:
    driver: overlay
  edge:
    external: true

volumes:
  kintunnel_config:
  kintunnel_data:
  kintunnel_backups:

secrets:
  kintunnel_admin_token:
    external: true
  kintunnel_engine_api_token:
    external: true
