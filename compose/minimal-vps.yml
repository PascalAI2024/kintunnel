# Minimal single-node VPS overlay.
#
# Usage:
#   docker compose -f docker-compose.yml -f compose/minimal-vps.yml --profile admin up -d
#
# Host prerequisites:
#   - UDP ${KINTUNNEL_WG_PORT:-51820} open on the VPS firewall.
#   - /dev/net/tun present.
#   - IPv4 forwarding enabled on the host.
#   - Admin UI kept on localhost, then reached by SSH tunnel or HTTPS proxy.

services:
  engine:
    restart: unless-stopped
    environment:
      KINTUNNEL_DRY_RUN: ${KINTUNNEL_DRY_RUN:-true}
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"

  admin:
    restart: unless-stopped
    ports:
      - "${KINTUNNEL_ADMIN_BIND_HOST:-127.0.0.1}:${KINTUNNEL_ADMIN_PORT:-8080}:8080/tcp"
