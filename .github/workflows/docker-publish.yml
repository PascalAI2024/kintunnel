name: Docker publish

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR if a Dockerfile exists"
        type: boolean
        required: true
        default: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish container placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Inspect build inputs
        id: inspect
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Dockerfile ]; then
            echo "dockerfile=true" >> "$GITHUB_OUTPUT"
            echo "Dockerfile found."
          else
            echo "dockerfile=false" >> "$GITHUB_OUTPUT"
            echo "No root Dockerfile found. Skipping container build placeholder."
          fi

      - name: Set up Docker Buildx
        if: steps.inspect.outputs.dockerfile == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.inspect.outputs.dockerfile == 'true' && (github.event_name == 'push' || inputs.push)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.inspect.outputs.dockerfile == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and optionally push
        if: steps.inspect.outputs.dockerfile == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
