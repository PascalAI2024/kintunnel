name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node-runtime:
    name: Node runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Test workspace
        run: npm test

  docker:
    name: Docker build and compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Compose model
        run: docker compose --env-file .env.example config

      - name: Validate Compose admin profile
        run: docker compose --env-file .env.example --profile admin config

      - name: Validate minimal VPS overlay
        run: docker compose --env-file .env.example -f docker-compose.yml -f compose/minimal-vps.yml --profile admin config

      - name: Validate Dokploy Swarm reference
        env:
          KINTUNNEL_ENGINE_IMAGE: kintunnel-engine:ci
          KINTUNNEL_ADMIN_IMAGE: kintunnel-admin:ci
        run: docker compose --env-file .env.example -f compose/dokploy-swarm.yml config

      - name: Build engine image
        run: docker build -f Dockerfile.engine -t kintunnel-engine:ci .

      - name: Build admin image
        run: docker build -f Dockerfile.admin -t kintunnel-admin:ci .

  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate GitHub Actions
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          ./actionlint

      - name: Inventory Markdown and YAML
        shell: bash
        run: |
          set -euo pipefail
          echo "Markdown files:"
          find . -path './.git' -prune -o -type f \( -name '*.md' -o -name '*.markdown' \) -print | sort
          echo
          echo "YAML files:"
          find . -path './.git' -prune -o -type f \( -name '*.yml' -o -name '*.yaml' \) -print | sort

      - name: Validate YAML syntax
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -path './.git' -prune -o -type f \( -name '*.yml' -o -name '*.yaml' \) -print | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No YAML files found."
            exit 0
          fi
          ruby -e 'require "yaml"; ARGV.each { |file| YAML.load_file(file); puts "ok #{file}" }' "${files[@]}"

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find scripts -type f -name '*.sh' -print 2>/dev/null | sort || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          for file in "${files[@]}"; do
            bash -n "$file"
            echo "ok $file"
          done

      - name: Markdown link inventory
        shell: bash
        run: |
          set -euo pipefail
          find . -path './.git' -prune -o -type f -name '*.md' -print | sort
