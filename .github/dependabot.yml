version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    # Keep initial public scaffold quiet until runtime packages land.
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Docker and Docker Compose update checks should be enabled once runtime
  # images exist. The current Compose files intentionally reference future
  # KinTunnel package names, so enabling Docker ecosystems now creates noisy
  # Dependabot failures against images that have not been published yet.
