name: Feature request
description: Propose a capability, integration, or operational improvement.
title: "[Feature]: "
labels: ["type: enhancement", "status: needs triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator pain should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version first.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - Deployment
        - Configuration
        - Networking
        - Security
        - CI / Release
        - Unknown
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider, and why is this better?
    validations:
      required: false
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement or test this.
          required: false
